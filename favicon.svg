<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="BTDD Platform logo">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0c0c14"/>
      <stop offset="100%" stop-color="#141422"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#4096ff"/>
      <stop offset="100%" stop-color="#36cfc9"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4096ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4096ff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)" stroke="#1f1f3a" stroke-width="1"/>
  <!-- Glow -->
  <rect x="8" y="6" width="48" height="24" rx="8" fill="url(#glow)"/>
  <!-- Chart bars -->
  <rect x="12" y="38" width="6" height="14" rx="2" fill="#333355"/>
  <rect x="21" y="32" width="6" height="20" rx="2" fill="#333355"/>
  <rect x="30" y="26" width="6" height="26" rx="2" fill="url(#accent)"/>
  <rect x="39" y="22" width="6" height="30" rx="2" fill="url(#accent)"/>
  <rect x="48" y="16" width="6" height="36" rx="2" fill="url(#accent)"/>
  <!-- Trend line -->
  <polyline points="15,36 24,30 33,24 42,20 51,14" fill="none" stroke="#36cfc9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow tip -->
  <polygon points="51,14 48,18 52,17" fill="#36cfc9"/>
  <!-- BT text -->
  <text x="32" y="13" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="9" fill="#e0e0ff" letter-spacing="2">BTDD</text>
</svg>
