<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>BTDD Logos → PNG</title>
<style>
body { background: #1a1a2e; color: #fff; font-family: Arial, sans-serif; text-align: center; padding: 40px; }
.logo-block { display: inline-block; margin: 30px; vertical-align: top; }
canvas { border-radius: 50%; display: block; margin: 10px auto; }
a.btn { display: inline-block; margin-top: 12px; padding: 12px 32px; background: #2196f3; color: #fff; text-decoration: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
a.btn.green { background: #4caf50; }
h2 { margin-bottom: 5px; }
p { color: #aaa; font-size: 14px; }
</style>
</head><body>
<h1>BTDD Логотипы — скачать PNG</h1>
<p>Нажми кнопку под каждым логотипом чтобы скачать JPG 640×640</p>

<div class="logo-block">
  <h2>🔵 Канал BTDD_Live</h2>
  <canvas id="c1" width="640" height="640"></canvas>
  <a class="btn" id="dl1" download="btdd_channel_logo.jpg">⬇ Скачать JPG</a>
</div>

<div class="logo-block">
  <h2>🟢 Чат BTDD_Discuss</h2>
  <canvas id="c2" width="640" height="640"></canvas>
  <a class="btn green" id="dl2" download="btdd_chat_logo.jpg">⬇ Скачать JPG</a>
</div>

<script>
const SVG_CHANNEL = `<svg width="640" height="640" viewBox="0 0 640 640" xmlns="http://www.w3.org/2000/svg"><circle cx="320" cy="320" r="320" fill="#0f1f3a"/><line x1="120" y1="200" x2="120" y2="480" stroke="#1a3050" stroke-width="1"/><line x1="220" y1="200" x2="220" y2="480" stroke="#1a3050" stroke-width="1"/><line x1="320" y1="200" x2="320" y2="480" stroke="#1a3050" stroke-width="1"/><line x1="420" y1="200" x2="420" y2="480" stroke="#1a3050" stroke-width="1"/><line x1="520" y1="200" x2="520" y2="480" stroke="#1a3050" stroke-width="1"/><line x1="120" y1="280" x2="520" y2="280" stroke="#1a3050" stroke-width="1"/><line x1="120" y1="360" x2="520" y2="360" stroke="#1a3050" stroke-width="1"/><line x1="120" y1="440" x2="520" y2="440" stroke="#1a3050" stroke-width="1"/><path d="M120,420 L180,410 L220,390 L260,400 L300,350 L340,320 L380,280 L420,260 L460,230 L520,200" fill="none" stroke="#4fc3f7" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="520" cy="200" r="10" fill="#4fc3f7"/><circle cx="520" cy="200" r="16" fill="none" stroke="#4fc3f7" stroke-width="2" opacity="0.4"/><polygon points="510,170 520,148 530,170" fill="#4caf50" opacity="0.9"/><text x="320" y="540" text-anchor="middle" fill="#ffffff" font-size="72" font-weight="800" font-family="Arial,sans-serif">BTDD</text><text x="320" y="580" text-anchor="middle" fill="#4fc3f7" font-size="22" font-weight="500" font-family="Arial,sans-serif">ALGO TRADING</text></svg>`;

const SVG_CHAT = `<svg width="640" height="640" viewBox="0 0 640 640" xmlns="http://www.w3.org/2000/svg"><circle cx="320" cy="320" r="320" fill="#0f2a18"/><rect x="160" y="180" rx="24" ry="24" width="220" height="70" fill="#1b5e20" opacity="0.6"/><rect x="170" y="200" rx="6" ry="6" width="120" height="10" fill="#4caf50" opacity="0.7"/><rect x="170" y="220" rx="6" ry="6" width="80" height="10" fill="#4caf50" opacity="0.5"/><rect x="260" y="280" rx="24" ry="24" width="240" height="70" fill="#2e7d32" opacity="0.6"/><rect x="270" y="300" rx="6" ry="6" width="140" height="10" fill="#66bb6a" opacity="0.7"/><rect x="270" y="320" rx="6" ry="6" width="100" height="10" fill="#66bb6a" opacity="0.5"/><rect x="140" y="380" rx="24" ry="24" width="200" height="70" fill="#1b5e20" opacity="0.6"/><rect x="150" y="400" rx="6" ry="6" width="110" height="10" fill="#4caf50" opacity="0.7"/><rect x="150" y="420" rx="6" ry="6" width="70" height="10" fill="#4caf50" opacity="0.5"/><text x="320" y="540" text-anchor="middle" fill="#ffffff" font-size="72" font-weight="800" font-family="Arial,sans-serif">BTDD</text><text x="320" y="580" text-anchor="middle" fill="#66bb6a" font-size="22" font-weight="500" font-family="Arial,sans-serif">COMMUNITY</text></svg>`;

function renderSVGtoPNG(svgStr, canvasId, downloadId) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  const blob = new Blob([svgStr], {type: 'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = function() {
    ctx.drawImage(img, 0, 0, 640, 640);
    URL.revokeObjectURL(url);
    document.getElementById(downloadId).href = canvas.toDataURL('image/jpeg', 0.95);
  };
  img.src = url;
}
renderSVGtoPNG(SVG_CHANNEL, 'c1', 'dl1');
renderSVGtoPNG(SVG_CHAT, 'c2', 'dl2');
</script>
</body></html>
